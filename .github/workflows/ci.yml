name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        # Adjust cache-dependency-path if your package.json is in a subdirectory, e.g., 'frontend/package-lock.json'
        # cache-dependency-path: frontend/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Type Check
      run: npx tsc --noEmit

    - name: Lint
      run: npm run lint

    - name: Build Next.js
      run: npm run build
      env:
        # Since this is just a build test, Next.js can build without real API keys
        # Vercel provides the real environment variables during production deployments
        NEXT_TELEMETRY_DISABLED: 1
